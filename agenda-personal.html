<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agenda do Personal</title>
  <link rel="stylesheet" href="aluno.css">
</head>
<body>

  <main class="app">

    <header class="topo">
      <div>
        <p>Área do Personal</p>
        <h1>Agenda</h1>
      </div>
      <button onclick="voltar()" class="btn-sair">Voltar</button>
    </header>

    <section class="card">
      <h2>Novo horário</h2>

      <input type="date" id="dataHorario">
      <input type="time" id="horaHorario">

      <button onclick="criarHorario()">Criar horário</button>
    </section>

    <section class="card" style="margin-top: 25px;">
      <h2>Minha agenda</h2>
      <div id="listaAgenda" style="margin-top: 15px;">
        <p>Carregando agenda...</p>
      </div>
    </section>

  </main>

  <script type="module" src="firebase.js"></script>
  <script type="module" src="agenda-personal.js"></script>
</body>
</html>
