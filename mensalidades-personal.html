<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mensalidades</title>
  <link rel="stylesheet" href="aluno.css">
</head>
<body>

  <main class="app">

    <header class="topo">
      <div>
        <p>Área do Personal</p>
        <h1>Mensalidades</h1>
      </div>
      <button onclick="voltar()" class="btn-sair">Voltar</button>
    </header>

    <section class="card">
      <h2>Nova mensalidade</h2>

      <select id="alunoSelect">
        <option value="">Selecione o aluno</option>
      </select>

      <input type="text" id="nomePlano" placeholder="Ex: Plano Mensal">
      <input type="number" id="valorPlano" placeholder="Valor em R$">
      <input type="date" id="vencimento">

      <select id="statusPagamento">
        <option value="pendente">Pendente</option>
        <option value="pago">Pago</option>
        <option value="atrasado">Atrasado</option>
      </select>

      <button onclick="salvarMensalidade()">Salvar mensalidade</button>
    </section>

    <section class="card" style="margin-top: 25px;">
      <h2>Mensalidades cadastradas</h2>
      <div id="listaMensalidades" style="margin-top: 15px;"></div>
    </section>

  </main>

  <script type="module" src="firebase.js"></script>
  <script type="module" src="mensalidades-personal.js"></script>
</body>
</html>
