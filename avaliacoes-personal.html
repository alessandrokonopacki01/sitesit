<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Avaliações Físicas</title>
  <link rel="stylesheet" href="aluno.css">
</head>
<body>

  <main class="app">

    <header class="topo">
      <div>
        <p>Área do Personal</p>
        <h1>Avaliações</h1>
      </div>
      <button onclick="voltar()" class="btn-sair">Voltar</button>
    </header>

    <section class="card">
      <h2>Nova avaliação</h2>

      <select id="alunoSelect">
        <option value="">Selecione o aluno</option>
      </select>

      <input type="date" id="dataAvaliacao">
      <input type="number" id="peso" placeholder="Peso em kg">
      <input type="number" id="altura" placeholder="Altura em cm">
      <input type="number" id="gordura" placeholder="Gordura corporal %">
      <input type="number" id="cintura" placeholder="Cintura em cm">
      <input type="number" id="braco" placeholder="Braço em cm">
      <input type="number" id="coxa" placeholder="Coxa em cm">

      <textarea id="observacoes" placeholder="Observações da avaliação"></textarea>

      <button onclick="salvarAvaliacao()">Salvar avaliação</button>
    </section>

  </main>

  <script type="module" src="firebase.js"></script>
  <script type="module" src="avaliacoes-personal.js"></script>
</body>
</html>
