<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Galeria de Exercícios</title>
  <link rel="stylesheet" href="aluno.css">
</head>
<body>

  <main class="app">

    <header class="topo">
      <div>
        <p>Área do Personal</p>
        <h1>Exercícios</h1>
      </div>
      <button onclick="voltar()" class="btn-sair">Voltar</button>
    </header>

    <section class="card">
      <h2>Novo exercício</h2>

      <input type="text" id="nomeExercicio" placeholder="Nome do exercício">
      <input type="text" id="grupoMuscular" placeholder="Grupo muscular">
      <input type="text" id="equipamento" placeholder="Equipamento">
      <input type="text" id="video" placeholder="Link do vídeo">

      <textarea id="descricao" placeholder="Descrição / execução do exercício"></textarea>

      <button onclick="salvarExercicio()">Salvar exercício</button>
    </section>

    <section class="card" style="margin-top: 25px;">
      <h2>Minha galeria</h2>
      <div id="listaExercicios" style="margin-top: 15px;">
        <p>Carregando exercícios...</p>
      </div>
    </section>

  </main>

  <script type="module" src="firebase.js"></script>
  <script type="module" src="exercicios-personal.js"></script>
</body>
</html>
