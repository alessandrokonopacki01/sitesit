<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Criar Treino</title>
  <link rel="stylesheet" href="aluno.css">
</head>
<body>

  <main class="app">

    <header class="topo">
      <div>
        <p>Área do Personal</p>
        <h1>Criar Treino</h1>
      </div>
      <button onclick="voltar()" class="btn-sair">Voltar</button>
    </header>

    <section class="card">
      <h2>Novo treino</h2>

      <select id="alunoSelect">
        <option value="">Selecione o aluno</option>
      </select>

      <input type="text" id="tituloTreino" placeholder="Ex: Treino A - Peito e Tríceps">

      <textarea id="descricaoTreino" placeholder="Digite os exercícios, séries e repetições"></textarea>

      <button onclick="salvarTreino()">Salvar treino</button>
    </section>

    <section class="card" style="margin-top: 25px;">
      <h2>Treinos criados</h2>
      <div id="listaTreinos" style="margin-top: 15px;"></div>
    </section>

  </main>

  <script type="module" src="firebase.js"></script>
  <script type="module" src="treinos-personal.js"></script>
</body>
</html>
