<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Criar Treino</title>
  <link rel="stylesheet" href="aluno.css">
</head>
<body>

  <main class="app">

    <header class="topo">
      <div>
        <p>Área do Personal</p>
        <h1>Criar Treino</h1>
      </div>
      <button onclick="voltar()" class="btn-sair">Voltar</button>
    </header>

    <section class="card">
      <h2>Nova ficha</h2>

      <select id="alunoSelect">
        <option value="">Selecione o aluno</option>
      </select>

      <input type="text" id="tituloTreino" placeholder="Ex: Treino A - Peito e Tríceps">

      <hr style="margin: 20px 0; border-color: #333;">

      <h3>Adicionar exercício</h3>

      <select id="exercicioSelect">
        <option value="">Selecione um exercício</option>
      </select>

      <input type="number" id="series" placeholder="Séries. Ex: 4">
      <input type="text" id="repeticoes" placeholder="Repetições. Ex: 8 a 12">
      <input type="text" id="carga" placeholder="Carga. Ex: 40 kg">
      <input type="text" id="descanso" placeholder="Descanso. Ex: 60s">

      <textarea id="observacaoExercicio" placeholder="Observação do exercício"></textarea>

      <button onclick="adicionarExercicioAoTreino()">Adicionar exercício</button>
    </section>

    <section class="card" style="margin-top: 25px;">
      <h2>Exercícios da ficha</h2>
      <div id="listaFicha" style="margin-top: 15px;">
        <p>Nenhum exercício adicionado.</p>
      </div>

      <button onclick="salvarTreino()" style="margin-top: 15px;">
        Salvar ficha para o aluno
      </button>
    </section>

  </main>

  <script type="module" src="firebase.js"></script>
  <script type="module" src="treinos-personal.js"></script>
</body>
</html>
